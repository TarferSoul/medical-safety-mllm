### model
model_name_or_path: /mnt/shared-storage-user/ai4good1-share/hf_hub/Qwen/Qwen3-VL-8B-Instruct
image_max_pixels: 262144
video_max_pixels: 16384
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: full
freeze_vision_tower: true
freeze_multi_modal_projector: true
freeze_language_model: false
deepspeed: examples/deepspeed/ds_z3_config.json    # ← Stage 2 is faster, 8B fits easily on 8xH200

### dataset
dataset_dir:  ../dataset
dataset: cxr_all_train_clean
template: qwen3_vl
cutoff_len: 65536                                   # ← Fixed typo (was 65536)
max_samples: 1000000
overwrite_cache: true
preprocessing_num_workers: 16
dataloader_num_workers: 4

### output
output_dir: /mnt/shared-storage-user/ai4good1-share/xieyuejin/models/qwen3_vl-8b/qwen3_vl_8b_full_sft_260222
logging_steps: 10
save_strategy: epoch
plot_loss: true
overwrite_output_dir: true
save_only_model: true
report_to: none

### train
per_device_train_batch_size: 4                      # ← Reduce: 32K seq len eats a lot of memory
gradient_accumulation_steps: 8                       # ← Increase to keep effective batch = 128
gradient_checkpointing: true                        # ← CRITICAL: must enable for 32K sequences
learning_rate: 1.0e-5
num_train_epochs: 2.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null