### model
model_name_or_path: /mnt/shared-storage-user/ai4good1-share/hf_hub/Qwen/Qwen3-VL-8B-Instruct
image_max_pixels: 262144
video_max_pixels: 16384
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: full
freeze_vision_tower: true
freeze_multi_modal_projector: true
freeze_language_model: false
deepspeed: examples/deepspeed/ds_z3_config.json

### dataset
dataset_dir:  ../dataset
dataset: mimic_cxr_train_normalized_v2_improved_w_qwen3vl32b_reason
template: qwen3_vl
cutoff_len: 32768
max_samples: 100000
overwrite_cache: true
preprocessing_num_workers: 16
dataloader_num_workers: 4

### output
output_dir: /mnt/shared-storage-user/ai4good1-share/xieyuejin/models/qwen3_vl-8b/sft_mimic_cxr_full_norm_report_w_qwen3vl32b_reason

logging_steps: 10
save_strategy: epoch
# save_steps: 1000
plot_loss: true
overwrite_output_dir: true
save_only_model: true
report_to: none  # choices: [none, wandb, tensorboard, swanlab, mlflow]

### train
per_device_train_batch_size: 8
gradient_accumulation_steps: 2
learning_rate: 1.0e-5
num_train_epochs: 2.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null

