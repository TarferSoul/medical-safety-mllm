# ============================================================================
# Judge Prompt Configuration
# 评审提示词配置
# ============================================================================

judge_prompt:
  system_message: "You are a helpful assistant designed to output JSON."

  template: |
    You are an expert Radiologist and Medical Evaluator. Your task is to evaluate the quality of a generated chest X-ray report (Candidate) by comparing it against the expert-written Ground Truth report (Reference).

    ### Evaluation Criteria:
    1. **Clinical Accuracy (Most Important):** Does the Candidate identify the same pathologies (e.g., pneumonia, effusion, pneumothorax, edema) as the Reference?
    2. **Negation correctness:** specific attention to "No", "Not", "Free of". Confusing "No pneumothorax" with "Small pneumothorax" is a critical error.
    3. **Anatomical Correctness:** Are the findings localized correctly (e.g., Left Lower Lobe vs Right Upper Lobe)?
    4. **Omissions vs Hallucinations:**
       - **Omission:** The Reference reports a disease, but the Candidate misses it.
       - **Hallucination:** The Reference says normal, but the Candidate invents a disease.

    ### Instructions:
    - Ignore formatting differences (e.g., "Findings:" vs "FINDINGS").
    - Ignore the "INDICATION" and "COMPARISON" sections unless they contain critical diagnostic findings not present elsewhere. Focus heavily on "FINDINGS" and "IMPRESSION".
    - Synonyms are accepted (e.g., "Opacities" ≈ "Infiltrates" ≈ "Consolidation" in specific contexts; "Cardiomegaly" ≈ "Enlarged heart").

    ### Input Data:
    **[Ground Truth Report]:**
    {ground_truth}

    **[Candidate Report]:**
    {prediction}

    ### Output Format:
    ONLY return a JSON object with the following structure, DO NOT RETURN ANYTHING ELSE:
    {{
      "reasoning": "Step-by-step comparison of findings...",
      "error_types": ["None" | "Omission" | "Hallucination" | "Localization Error" | "Severity Error"],
      "clinical_accuracy_score": <float 0.0 to 10.0>
    }}

    **Scoring Rubric:**
    - **10.0:** Perfect clinical alignment. Only stylistic differences.
    - **8.0-9.0:** Minor discrepancies (e.g., missed a minor scar, or slight severity difference), but main diagnosis is correct.
    - **5.0-7.0:** Correctly identifies normal vs abnormal, but misses specific details (e.g., wrong lobe) or hallucinates a minor finding.
    - **1.0-4.0:** Major diagnostic error (e.g., Reference says "Pneumonia", Candidate says "Normal"; or Candidate hallucinates "Edema" when lungs are clear).

# ============================================================================
# Reasoning Prompt Configuration
# 推理提示词配置
# ============================================================================

reasoning_prompt:
  template: |
    Role: Expert Radiologist.
    Task: Reverse-engineer the radiologist's thought process. You are given a Chest X-ray and the Ground Truth Report. Your goal is to generate the "Chain of Thought" that connects the raw image pixels to the final diagnosis.

    **Ground Truth Report:**
    {ground_truth}

    **Instructions:**
    Analyze the case and output your reasoning in 4 strict steps.

    **Step 1: Anatomy & Support Devices (The "Safety Check")**
    - Observe the image quality (projection, rotation).
    - Identify ALL medical devices (lines, tubes, clips, etc.).
    - *Constraint:* Describe their precise anatomical termination points based ONLY on visual evidence.

    **Step 2: Visual Feature Extraction (The "What")**
    - Identify abnormal visual signals (opacities, lucencies, deformities).
    - Use precise radiological terms (e.g., "patchy consolidation," "blunting," "silhouette sign").
    - *CRITICAL RULE:* Do NOT mention the patient's clinical history (e.g., "AML," "sepsis," "transplant") in this step. Describe only what is physically visible on the image.

    **Step 3: Diagnostic Synthesis (The "Why")**
    - Now, combine the Visual Features from Step 2 with the Clinical History provided in the report.
    - Explain the logic: "The visual finding of [Feature X] combined with the history of [Condition Y] supports the diagnosis of [Diagnosis Z]."
    - Differentiate: Explain why the findings support the specific conclusion in the report over other possibilities (e.g., "Why is this likely pneumonia and not just edema?").

    **Step 4: Conclusion Alignment**
    - Summarize the primary finding that drives the immediate clinical management.

    **Output Format:**
    Provide the reasoning directly. Do not use conversational fillers.

